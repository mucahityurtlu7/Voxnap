name: Mobile Release

# Build Voxnap for iOS and Android. Triggered on the same `v*` tags as
# the desktop workflow but kept separate because the toolchain (Xcode,
# Android NDK) is heavier and we don't want it slowing the desktop matrix
# on every release.
#
# What gets produced
# ------------------
#   • Android: a *release* APK + AAB (universal). Unsigned by default;
#     if you populate `ANDROID_KEYSTORE` / `ANDROID_KEY_*` secrets the
#     APK is signed and ready for Play Store / sideloading.
#   • iOS: an `.ipa` archive. Requires Apple Developer secrets
#     (APPLE_API_*) to be set, otherwise we fall back to a simulator
#     `.app` artifact for QA.
#
# whisper.cpp acceleration on mobile is wired via Cargo target-cfg in
# `apps/desktop/src-tauri/Cargo.toml` (CoreML auto on iOS, CPU on Android).
# End users never compile anything — they install the artifact attached
# to the GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/mobile/src-tauri -> target
            apps/desktop/src-tauri -> target
          key: android

      - name: Install Linux deps for Tauri host build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libasound2-dev libssl-dev

      - run: pnpm install --frozen-lockfile

      - name: Fetch whisper model
        run: pnpm fetch:model

      - name: Tauri Android init
        working-directory: apps/mobile
        run: pnpm tauri android init --ci

      - name: Tauri Android build
        working-directory: apps/mobile
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm tauri android build --apk --aab

      - name: Stage artifacts
        run: |
          mkdir -p _release
          shopt -s nullglob globstar
          for f in apps/mobile/src-tauri/gen/android/**/*.apk apps/mobile/src-tauri/gen/android/**/*.aab; do
            cp -f "$f" "_release/$(basename "$f")"
          done
          ls -la _release

      - uses: actions/upload-artifact@v4
        with:
          name: voxnap-android
          path: _release/*
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS (IPA)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/mobile/src-tauri -> target
            apps/desktop/src-tauri -> target
          key: ios

      - run: pnpm install --frozen-lockfile

      - name: Fetch whisper model
        run: pnpm fetch:model

      - name: Tauri iOS init
        working-directory: apps/mobile
        run: pnpm tauri ios init --ci

      - name: Tauri iOS build
        working-directory: apps/mobile
        env:
          # Optional — only needed for a signed .ipa. If unset we still
          # produce an unsigned simulator build artifact for testers.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri ios build || pnpm tauri ios build --target aarch64-sim

      - name: Stage artifacts
        run: |
          mkdir -p _release
          shopt -s nullglob globstar
          for f in apps/mobile/src-tauri/gen/apple/build/**/*.ipa apps/mobile/src-tauri/gen/apple/build/**/*.app; do
            base="$(basename "$f")"
            if [ -d "$f" ]; then
              (cd "$(dirname "$f")" && zip -qr "$GITHUB_WORKSPACE/_release/${base%.app}-sim.app.zip" "$base")
            else
              cp -f "$f" "_release/$base"
            fi
          done
          ls -la _release

      - uses: actions/upload-artifact@v4
        with:
          name: voxnap-ios
          path: _release/*
          if-no-files-found: warn
          retention-days: 14

  publish:
    name: Attach mobile artifacts to release
    needs: [android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/*
