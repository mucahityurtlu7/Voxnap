name: Web

# Build the in-browser Voxnap (Vite + whisper.wasm) on every push and
# deploy it to GitHub Pages on `main` and on tags. End-users hit the
# resulting URL — there is no native install or compile step on their
# side; whisper.wasm runs CPU-side in the browser worker, with WebGPU
# auto-detected by the engine when available.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build web app
        # GitHub Pages serves the site under /<repo>/. Vite reads
        # VITE_BASE_PATH (see apps/web/vite.config.ts) to prefix every
        # asset URL accordingly. github.event.repository.name is the
        # current repo name, so this works when forked too.
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm build:web

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
